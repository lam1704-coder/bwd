<!DOCTYPE html>
<html lang="vi">
 
<head>
<meta charset="UTF-8">
<title>Đang chờ chữa bài</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8eaf2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

.loader{
    width:60px;
    height:60px;
    border:6px solid #ddd;
    border-top:6px solid #73937e;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

</style>

</head>
<body>

<div class="box">

    <h1>Đã gửi bài thành công</h1>

    <div class="loader"></div>

    <p>Đang chờ Admin chữa bài...</p>

</div>

<script>
    // Lấy ID bài viết từ URL
    const urlParams = new URLSearchParams(window.location.search);
    const essayId = urlParams.get('id');
    const token = localStorage.getItem("token");

    // Nếu không có ID hoặc chưa đăng nhập thì quay về
    if(!essayId || !token) {
        window.location.href = "chuabai.html";
    }

    async function kiemTraKetQua(){
        try {
            // ĐÃ SỬA: Gọi API lấy kết quả bài viết kèm theo essayId
            let response = await fetch(`https://backend-wkbh.onrender.com/api/essays/${essayId}/result`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if(response.ok) {
                let essay = await response.json();
                
                // Trạng thái trong DB đã chuyển sang 'graded' (đã chấm)
                if(essay.status === "graded"){
                    window.location.href = `ketqua.html?id=${essayId}`;
                }
            }
        } catch (error) {
            console.error("Lỗi kiểm tra:", error);
        }
    }

    // Cứ 3 giây hỏi Server 1 lần
    setInterval(kiemTraKetQua, 3000);
</script>

</body>
</html>
