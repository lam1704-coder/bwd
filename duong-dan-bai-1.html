        // Kho lưu trữ dữ liệu nâng cao hỗ trợ cả văn bản phân trang và cấu trúc ô lưới (Grid)
        const articlesData = {
            "Tổng quan": {
    type: "text",
    pages: [
     [
    "Văn học nói bằng hình tượng, hình tượng nghệ thuật là khối pha lê lấp lánh làm nên giá trị tác phẩm văn học. Nếu cái thần của âm nhạc là giai điệu, của hội họa là đường nét và màu sắc thì cái thần của văn chương chính là ở hình tượng nhân vật. Song những tác phẩm văn học chỉ xây dựng nên những hình tượng về con người thì đó chưa hẳn là một tác phẩm vô giá.",

    "Bởi trong sáng tạo nghệ thuật, điều quan trọng, đặc sắc nhất nhiều khi không phải ở hình tượng con người mà ở hình tượng nhân vật. Chính vì vậy, có ý kiến cho rằng:",

    "<p class='text-center font-bold text-green-950 my-4 text-xl'>“Hình tượng nhân vật được sinh ra từ tâm trí của nhà văn nhưng chỉ thực sự sống bằng tâm trí của người đọc”</p>",

    "“Nhà thơ tư duy bằng hình tượng” (Biêlinxki). Văn học ở bất kì thời đại nào muốn phản ánh hiện thực đời sống đều phải thông qua các hình tượng nhân vật điển hình. Nhà thơ tư duy bằng hình tượng, nhà văn cũng tư duy bằng hình tượng. Thế giới thêm sắc màu, cuộc sống thêm âm điệu bởi những hình tượng nhân vật điển hình độc đáo.",

    "“Văn học và đời sống là hai vòng tròn đồng tâm mà tâm điểm của nó chính là con người” (Nguyễn Minh Châu). Văn học phản ánh cuộc sống và trung tâm là con người thông qua hình tượng nhân vật. Chính những hình tượng nghệ thuật độc đáo, có sức phổ quát, mang những ý nghĩa sâu sắc về nhân sinh đã góp phần làm nên nét riêng cho tác phẩm văn học. Người nghệ sĩ thường sáng tạo nên những tượng đài bất hủ về con người bằng cách xây dựng chính hình tượng nhân vật."
],

        [
    "Nghệ thuật đồng nghĩa với sáng tạo. Nghệ sĩ là kẻ làm công việc “khơi những nguồn chưa ai khơi và sáng tạo những gì chưa có” (Nam Cao). Viết văn là một quá trình khai phá những vỉa quặng của cuộc đời nhưng mỗi thứ kim loại quý hiếm nhà văn tìm thấy lại lấp lánh một sắc màu riêng biệt. Có phải đó là sắc màu của những hình tượng nhân vật điển hình được nhà văn nhặt nhạnh ở cuộc đời, nhào nặn trong tư tưởng và đưa vào tác phẩm dưới lớp áp chủ quan độc đáo? Ngay từ khi ra đời, văn học đã nhận thức đời sống và thể hiện tư tưởng tình cảm bằng các hình tượng nhân vật nghệ thuật. Từ tiếng gọi chú tiểu lẳng lơ nhưng đầy khao khát yêu đương của Thị Màu trên chiếu chèo ngày xưa đến đoạn trường mười lăm năm lưu lạc của Thúy Kiều trong thơ Nguyễn Du, hình tượng nhân vật điển hình đã thành sợi chỉ đỏ xuyên suốt các tác phẩm văn học, bắc nhịp cầu giữa hiện thực xã hội và tư tưởng nhân văn. Như lời nhận định đã bàn tới, “hình tượng nhân vật được sinh ra từ tâm trí của nhà văn nhưng chỉ thực sự sống bằng tâm trí của người đọc” bởi nhà văn xây dựng hình tượng nhân vật để khái quát hiện thực, để cắt nghĩa đời sống và thể hiện tư tưởng của chính mình. Vì vậy, hiện thực trong tác phẩm mang đậm dấu ấn chủ quan của người nghệ sĩ. Nhà văn là chủ thể sáng tạo, là kẻ chi phối mọi tư tưởng thẩm mĩ, góc nhìn và phạm vi của hiện thực nên dù được bắt nguồn từ cuộc sống, dù được nuôi dưỡng bằng bầu sữa của bà mẹ cuộc đời thì tác phẩm văn chương qua các hình tượng nhân vật vẫn phản ánh hiện thực được sinh ra từ tâm trí của nhà văn. Tác phẩm văn chương không bao giờ là bản sao của hiện thực mà hiện thực được soi chiếu vào tác phẩm bằng lăng kính chủ quan của người viết. Hiện thực cuộc sống được khoác lên tấm áo nhiều màu như vậy chính là bởi hình tượng nhân vật được nhà văn đưa vào tác phẩm. Hình tượng nhân vật là đứa con của hiện thực cuộc sống nhưng lại được nuôi dưỡng bằng tình cảm và tư tưởng của nhà văn. Nó cũng là cuộc đời riêng nhưng đồng thời cũng là cái loa phát ngôn của người nghệ sĩ. Trong bản thân hình tượng bao giờ cũng có sự thống nhất sinh động giữa các mặt cá biệt và khái quát, lí trí và cảm xúc, chủ quan và khách quan. Hình tượng càng độc đáo, được nâng lên mức điển hình thì hiện thực càng được phản ánh ở những góc cạnh sâu xa nhất, hướng tới một giá trị thẩm mĩ riêng – “chỉ thực sự sống bằng tâm trí của người đọc”. Đến với hình tượng nhân vật là đến với một thế giới hiện thực riêng biệt được xây dựng ngay trên nền thế giới hiện thực đương thời. Hình tượng nhân vật tỏa sáng lí tưởng thẩm mĩ lên trên hiện thực bề bộn, để cho người đọc có một cái nhìn mới mẻ, chân thực và sâu sắc hơn về cuộc đời. Lời nhận định đã khẳng định tầm quan trọng và giá trị biểu hiện của hình tượng nhân vật trong tác phẩm. Đó cũng là cơ sở để đánh giá tư tưởng nhà văn và giá trị của toàn bộ tác phẩm."
],
[
    "Những hình tượng điển hình ấy không bao giờ chỉ đơn thuần là một bức tranh nhân sinh mà bao giờ cũng gửi đến người đọc một thông điệp; một triết lí sâu xa. Chính vì vậy, khi bước ra khỏi trang viết, nhân vật không còn bị giới hạn bởi ý đồ ban đầu của nhà văn mà tiếp tục sống đời sống riêng trong tâm trí mỗi người tiếp nhận, nơi họ được tái tạo, được đối thoại và được nhìn nhận dưới nhiều tầng nghĩa khác nhau. Mỗi độc giả với vốn sống, trải nghiệm và cảm xúc riêng sẽ “thổi” vào nhân vật một cách hiểu mới, khiến hình tượng ấy luôn vận động, luôn biến đổi mà vẫn giữ được hạt nhân thẩm mĩ cốt lõi. Điều đó lí giải vì sao một chị Dậu có thể vừa là biểu tượng của nỗi khổ người nông dân, vừa là hiện thân của sức phản kháng âm thầm; hay một Chí Phèo vừa là kẻ lưu manh hóa cùng cực, vừa là tiếng kêu đòi quyền làm người da diết. Nhờ khả năng gợi mở ấy, hình tượng nhân vật vượt khỏi giới hạn của một hiện thực cụ thể để trở thành giá trị mang tính phổ quát, góp phần khẳng định sức sống bền vững của tác phẩm văn học trong dòng chảy thời gian.",
    "Biêlinxki từng phân biệt: “Nhà triết học nói bằng phép tam đoạn luận, nhà văn nói bằng các hình tượng và bức tranh. Dù đều đi từ cái riêng đến cái chung để khám phá cuộc sống con người, khám phá bản chất của thực tại nhưng trong quá trình nghiên cứu, trong khi các nhà triết học, khoa học gạt bỏ những chi tiết cá biệt, những yếu tố ngẫu nhiên để tìm ra cái chung; để khẳng định yếu tố khách quan, chân lí thì trong nghệ thuật lại in đậm dấu ấn chủ quan, cái chung được biểu hiện trong cái riêng; cái riêng để khái quát cái chung. Hình tượng nhân vật ra đời nhằm mục đích đó. Chí Phèo, Thị Nở từ văn chương đã bước ra cuộc đời; trở thành những cái tên như minh chứng tiêu biểu cho tính điển hình của hình tượng nhân vật. Ta thấy trong cuộc đời nhọc nhằn của anh Pha, chị Dậu… dáng dấp ông cha, những người cả đời gắn bó với ruộng đồng và chịu biết bao nhiêu áp bức. Đó chính là sự “sinh ra từ tâm trí của nhà văn”. Nhưng không bao giờ những Chí Phèo, chị Dậu ấy là bản thân cuộc đời thực. Văn học chỉ có một Chí Phèo với bi kịch bị cự tuyệt quyền làm người trong khi cuộc đời có cả ngàn thằng Chí Phèo uống rượu say rồi chửi bới. Văn học chỉ có một Hăm-lét với niềm trăn trở, day dứt vì lí tưởng “sống hay không sống” trong khi lịch sử có biết bao nhiêu âm mưu “chiếm ngôi vua, đoạt quyền chúa”. Không bao giờ người ta quên được tiếng nói khắc khoải của Chí Phèo: “Tao muốn làm người lương thiện. Ai cho tao ỉương thiện? Làm sao xóa được những vết sẹo trên mặt này?”. Không chỉ bởi một hiện thực khốc liệt của xã hội phong kiến dồn đuổi con người vào bước đường cùng mà sâu sắc hơn hết người ta nhận ra trong đó một khát vọng sống mạnh mẽ; cháy bỏng; một ước muốn lương thiện giản dị mà cao đẹp của một tâm hồn tội lỗi. Lần đầu tiên người ta nhận ra ánh sáng của lương tri, ánh sáng của tính người tỏa ra từ thân xác của con quỷ dữ. Đó chính là “ánh sáng riêng” của hình tượng Chí Phèo “chỉ thực sự sống bằng tâm trí của người đọc”."
],
[
    "Kinh Thư xưa có câu: “Thẩm sở mộng chi nhân, khắc kì hình tượng, dĩ tứ phương băng cửu chi ư dân gian” (Xem xét người thấy trong mộng, khắc lấy hình tượng của người ấy để đi tìm khắp bốn phương trong dân gian). Hình tượng nhân vật bao giờ cũng là ‘con người của dân gian”. Nó được thoát thai từ hiện thực đời sống và mang những tính cách cơ bản nhất, bản chất nhất và nổi bật nhất của đời sống xã hội. Nguyễn Du từ bao nhiêu cuộc đời long đong, lận đận của người phụ nữ trong xã hội phong kiến đã xây dựng lên hình tượng Thúy Kiều với tất cả nỗi đau khổ của loài người đúc kết lại:",

 "Trong cuộc đời mười lăm năm lưu lạc của Kiều có những “vết xe đổ” của Đạm Tiên, của Tiểu Thanh, của người con gái đất Long Thành cùng biết bao nỗi đau khổ khác của người phụ nữ trong xã hội phong kiến. Có thể nói, cuộc đời Thúy Kiều là một bức tranh toàn cảnh và sinh động về nỗi đoạn trường của người phụ nữ dưới xã hội hà khắc, nặng nề, tàn ác và thối nát của thời đại cũ. Hiện thực trong Truyện Kiều được tái hiện qua tâm trí của Nguyễn Du. Người đọc như được cùng nàng Kiều trải qua biết bao thăng trầm, tận mắt chứng kiến và thấu hiểu muôn vàn nỗi khổ đau của kiếp người. Nhưng Kiều không chỉ là đại diện cho một lớp người, cuộc đời Kiều không đơn thuần chỉ là một bức tranh hiện thực rộng lớn và Nguyễn Du không chỉ là ngòi bút hiện thực chủ nghĩa một chiều. Kiều được ca tụng là người phụ nữ đẹp nhất của văn học Việt Nam bởi những nét đẹp riêng biệt, độc đáo, chỉ tài năng Nguyễn Du mới có thể sáng tạo nên:",

        let currentTab = "Mở/Kết bài"; 
        let currentPage = 0;

        // --- HÀM RENDER NỘI DUNG CHÍNH ---
        function renderContent() {
            const titleElement = document.getElementById('contentTitle');
            const bodyElement = document.getElementById('contentBody');
            const paginationCtrl = document.getElementById('paginationCtrl');
            const displayArea = document.getElementById('displayArea');
            
            const currentData = articlesData[currentTab];
            if (!currentData) return;

            titleElement.innerText = currentTab === "Dẫn chứng" ? "Dẫn chứng & cách dùng" : currentTab;
            displayArea.style.opacity = 0.4;

            setTimeout(() => {
                if (currentData.type === "text") {
                    paginationCtrl.classList.remove('hidden');
                    
                    const totalPages = currentData.pages.length;
                    const pageParagraphs = currentData.pages[currentPage];
                    
                    document.getElementById('pageNumber').innerText = `Trang ${currentPage + 1} / ${totalPages}`;
                    
                    // Chuẩn hóa việc render: Chấp nhận cả chuỗi HTML và mảng chuỗi văn bản
                    if (Array.isArray(pageParagraphs)) {
                        bodyElement.innerHTML = pageParagraphs.map(para => {
                            const cleaned = para.trim();
                            if (cleaned.startsWith("<")) {
                                return cleaned;
                            }
                            return `<p class='mb-4'>${cleaned}</p>`;
                        }).join("");
                    } else {
                        bodyElement.innerHTML = pageParagraphs;
                    }
                    
                    document.getElementById('btnPrev').disabled = (currentPage === 0);
                    document.getElementById('btnNext').disabled = (currentPage === totalPages - 1);
                    
                } else if (currentData.type === "grid") {
                    paginationCtrl.classList.add('hidden');
                    
                    let gridHtml = `<div class='grid grid-cols-1 md:grid-cols-2 gap-6 mt-4'>`;
                    currentData.items.forEach((item, index) => {
                        gridHtml += `
                            <div onclick="openModal('${item.title}', ${index})" class="bg-[#14532d] hover:bg-[#1f663b] text-white p-8 rounded-2xl shadow-md transition-all duration-300 transform hover:-translate-y-1 cursor-pointer flex flex-col justify-center items-center text-center min-h-[140px]">
                                <h4 class="text-xl font-bold tracking-wide">${item.title}</h4>
                                <p class="text-xs text-green-200/80 mt-2 font-light line-clamp-2">${item.preview}</p>
                            </div>
                        `;
                    });
                    gridHtml += `</div>`;
                    bodyElement.innerHTML = gridHtml;
                }
                displayArea.style.opacity = 1;
            }, 100);
        }

        // --- HÀM XỬ LÝ POPUP MODAL ---
        function openModal(title, index) {
            const modal = document.getElementById('infoModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            const itemDetails = articlesData[currentTab].items[index].details;
            
            modalTitle.innerText = title;
            modalContent.innerHTML = itemDetails;
            
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        // --- ĐIỀU HƯỚNG TABS SIDEBAR ---
        function changeTab(tabName) {
            currentTab = tabName;
            currentPage = 0;
            const buttons = document.querySelectorAll('.sidebar-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const targetTab = document.getElementById(`tab-${tabName}`);
            if (targetTab) {
                targetTab.classList.add('active');
            }
            renderContent();
        }

        function nextPage() {
            if (currentPage < articlesData[currentTab].pages.length - 1) {
                currentPage++;
                renderContent();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderContent();
            }
        }

        // Khởi động giao diện mượt mà khi load trang hoàn tất
        document.addEventListener("DOMContentLoaded", () => {
            changeTab('Mở/Kết bài');
        });
    </script>
