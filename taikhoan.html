<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Chạm Văn Chương</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Anton&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://i.pinimg.com/736x/f6/ee/45/f6ee45314751f2bc8f30bb7b0f02ea2d.jpg') center top / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>

    <title>Tài khoản - Thơ ca</title>
    
    <script>
        // Nếu đã đăng nhập thành công từ trước, tự động chuyển về trang chủ (index.html)
        if (localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "index.html"; 
        }
    </script> 

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>

    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="logo-box" style="display: flex; justify-content: center; margin-bottom: 20px; background-color: transparent;">
                <img src="images/logo_.png" alt="Chạm Văn Chương" class="logo-image" style="display: block; width: 140px; height: auto; mix-blend-mode: multiply;">
            </div>

            <form id="formDangNhap" class="auth-form active">
                <div class="input-group">
                    <label>Email tài khoản</label>
                    <div class="input-line">
                        <i class="fa-solid fa-envelope icon-pink"></i>
                        <input type="email" id="login-email" required placeholder="Nhập email đăng nhập">
                    </div>
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="input-line">
                        <i class="fa-solid fa-lock icon-pink"></i>
                        <input type="password" id="login-password" required placeholder="Nhập mật khẩu">
                    </div>
                </div>

                <div class="forgot-pass"><a href="#">Quên mật khẩu?</a></div>
                <button type="submit" class="btn-auth">Đăng nhập</button>

                <div class="divider">
                    <span><i class="fa-solid fa-heart"></i> Hoặc <i class="fa-solid fa-heart"></i></span>
                </div>

                <button type="button" class="btn-social">Tiếp tục với một tài khoản</button>
                <p class="auth-footer">Đừng quên tạo một tài khoản? <span class="link-switch" onclick="chuyenForm()" style="cursor: pointer; color: pink;">Đăng ký</span></p>
            </form>

            <form id="formDangKy" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label>Họ và tên</label>
                    <div class="input-line">
                        <i class="fa-solid fa-user icon-pink"></i>
                        <input type="text" id="reg-name" required placeholder="Nhập họ và tên của bạn">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-line">
                        <i class="fa-solid fa-envelope icon-pink"></i>
                        <input type="email" id="reg-email" required placeholder="Nhập email (Dùng để đăng nhập)">
                    </div>
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <div class="input-line">
                        <i class="fa-solid fa-lock icon-pink"></i>
                        <input type="password" id="reg-password" required placeholder="Tạo mật khẩu bảo mật">
                    </div>
                </div>

                <div class="input-group">
                    <label>Nhập lại mật khẩu</label>
                    <div class="input-line">
                        <i class="fa-solid fa-lock icon-pink"></i>
                        <input type="password" id="reg-repassword" required placeholder="Xác nhận lại mật khẩu">
                    </div>
                </div>

                <p class="terms-text">Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a></p>
                <button type="submit" class="btn-auth">Đăng ký</button>

                <div class="divider">
                    <span><i class="fa-solid fa-heart"></i> Hoặc <i class="fa-solid fa-heart"></i></span>
                </div>

                <button type="button" class="btn-social">Tiếp tục với một tài khoản</button>
                <p class="auth-footer">Đã có tài khoản? <span class="link-switch" onclick="chuyenForm()" style="cursor: pointer; color: pink;">Đăng nhập</span></p>
            </form>
        </div>
    </div>

    <script src="taikhoan.js"></script>
</body>
</html>
