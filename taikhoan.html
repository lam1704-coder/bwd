<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Chạm Văn Chương</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Anton&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://i.pinimg.com/736x/f6/ee/45/f6ee45314751f2bc8f30bb7b0f02ea2d.jpg') center top / cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="glass-panel w-full max-w-md p-8 rounded-[2rem] text-center">
        <h1 class="font-['Anton'] text-4xl text-green-900 mb-2 tracking-wide">CHẠM VĂN CHƯƠNG</h1>
        <p class="text-gray-600 mb-8 font-medium">Đăng nhập để tiếp tục</p>

        <input type="text" id="username" placeholder="Tên đăng nhập" class="w-full px-5 py-3 mb-4 rounded-xl bg-white/80 border border-white outline-none focus:ring-2 focus:ring-green-700 transition">
        <input type="password" id="password" placeholder="Mật khẩu" class="w-full px-5 py-3 mb-6 rounded-xl bg-white/80 border border-white outline-none focus:ring-2 focus:ring-green-700 transition">

        <button onclick="login()" class="w-full bg-green-800 hover:bg-green-900 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">
            ĐĂNG NHẬP
        </button>
    </div>

    <script>
        function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // Đăng nhập giả lập bằng LocalStorage (sẽ thay bằng Backend sau)
            if(user === "admin" && pass === "123") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "admin");
                window.location.href = "admin.html"; // Chuyển đến trang quản trị
            } else if (user !== "") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("role", "student");
                window.location.href = "inde.HTML"; // Chuyển đến trang chủ
            } else {
                alert("Vui lòng nhập tên đăng nhập!");
            }
        }
    </script>
</body>
</html>
