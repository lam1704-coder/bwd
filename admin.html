<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị - Chữa Bài</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Anton&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://i.pinimg.com/736x/f6/ee/45/f6ee45314751f2bc8f30bb7b0f02ea2d.jpg') center top / cover no-repeat fixed;
        }
        /* Hiệu ứng kính mờ đồng bộ cho các thẻ nội dung */
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body class="py-10 px-4 min-h-screen">

<div class="max-w-[1000px] mx-auto">
    
    <div class="flex justify-between items-center mb-8 bg-white/30 backdrop-blur-md px-6 py-3 rounded-full border border-white/40 shadow-sm">
        <span class="text-xs font-bold text-green-900 tracking-wider uppercase">Quyền hạn: Quản trị viên</span>
        <button class="bg-red-500 hover:bg-red-600 text-white font-bold px-5 py-2 rounded-full text-xs shadow-md transition-all active:scale-95" onclick="logout()">
            Đăng xuất 
        </button>
    </div>

    <h1 class="font-['Anton'] text-4xl md:text-5xl text-green-900 text-center uppercase tracking-wider mb-10 drop-shadow-sm">
        Trang Quản Trị Chữa Bài
    </h1>

    <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-xl mb-6">
        <h2 class="font-bold text-lg text-green-900 uppercase tracking-wide border-b-2 border-white/60 pb-3 mb-4 flex items-center gap-2">
            📝 Bài đang chờ chữa
        </h2>
        <div id="noiDungBai" class="white-space-pre-wrap leading-relaxed text-gray-800 p-5 bg-white/60 rounded-xl border border-white/80 shadow-inner font-medium text-base">
            Đang tải bài viết...
        </div>
    </div>

    <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-xl mb-6">
        <h2 class="font-bold text-lg text-green-900 uppercase tracking-wide border-b-2 border-white/60 pb-3 mb-4">
            1. Đánh giá chung
        </h2>
        <textarea id="danhGiaChung" placeholder="Nhập nhận xét tổng quan về cấu trúc, luận điểm và kỹ năng diễn đạt của học viên..." 
                  class="w-full min-h-[120px] px-4 py-3 bg-white/70 border border-gray-200/80 rounded-xl outline-none focus:ring-2 focus:ring-green-700 focus:bg-white font-medium text-gray-800 transition-all shadow-sm"></textarea>
    </div>

    <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-xl mb-6">
        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 border-b-2 border-white/60 pb-3 mb-6">
            <h2 class="font-bold text-lg text-green-900 uppercase tracking-wide">
                2. Bóc tách lỗi cần sửa
            </h2>
            <button class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-bold px-5 py-2.5 rounded-full shadow-md transition-all active:scale-95 flex items-center gap-1 self-start" onclick="themLoiMoi()">
                <span>+</span> Thêm một lỗi mới
            </button>
        </div>
        
        <div id="danhSachLoiContainer" class="space-y-6"></div>
    </div>

    <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-xl mb-12">
        <h2 class="font-bold text-lg text-green-900 uppercase tracking-wide border-b-2 border-white/60 pb-3 mb-4">
            3. Gợi ý nâng cấp bài viết
        </h2>
        <textarea id="goiYNangCap" placeholder="Nhập các chất liệu văn học mở rộng, lý luận văn học hoặc cách viết mở/kết bài nâng cao để giúp bài viết sâu sắc hơn..." 
                  class="w-full min-h-[120px] px-4 py-3 bg-white/70 border border-gray-200/80 rounded-xl outline-none focus:ring-2 focus:ring-green-700 focus:bg-white font-medium text-gray-800 transition-all shadow-sm mb-6"></textarea>
        
        <button onclick="guiNhanXet()" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl text-base md:text-lg tracking-wider transition-all shadow-lg active:scale-[0.99] flex items-center justify-center gap-2">
            ✅ LƯU ĐÁNH GIÁ & HOÀN THÀNH CHỮA BÀI
        </button>
    </div>

</div>

<script>
    // 1. Kiểm tra quyền admin truy cập
    if(localStorage.getItem("role") !== "admin"){
        // Nếu tích hợp phân quyền trang đăng nhập, bỏ comment các dòng dưới
        // window.location.href = "taikhoan.html";
    }

    // 2. Lấy dữ liệu bài từ học viên gửi lên
    const baiChoChua = localStorage.getItem("baiChoChua");
    document.getElementById("noiDungBai").innerText = baiChoChua ? baiChoChua : "Hiện chưa có bài nào cần chữa từ hệ thống học viên.";

    // 3. Xử lý giao diện khối lỗi động bằng Tailwind CSS
    const errorContainer = document.getElementById("danhSachLoiContainer");

    function themLoiMoi() {
        const errorBlock = document.createElement("div");
        errorBlock.className = "error-block bg-white/60 border-2 border-dashed border-gray-300 p-5 rounded-2xl relative shadow-sm transition-all hover:border-green-600";
        errorBlock.innerHTML = `
            <div class="mb-4">
                <label class="block font-bold text-sm text-gray-700 mb-1.5 uppercase tracking-wide">Tiêu đề lỗi</label>
                <input type="text" class="input-tieude w-full px-4 py-2.5 bg-white/90 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-700 font-medium text-gray-800" placeholder="Ví dụ: Lỗi lặp từ diễn đạt, Dùng từ sai ngữ cảnh...">
            </div>
            
            <div class="mb-4">
                <label class="block font-bold text-sm text-gray-700 mb-1.5 uppercase tracking-wide">Đoạn văn bị lỗi (Trích từ bài gốc)</label>
                <input type="text" class="input-doangoc w-full px-4 py-2.5 bg-white/90 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-700 font-medium text-gray-800" placeholder="Copy hoặc trích dẫn đoạn văn chứa lỗi của học viên vào đây">
            </div>
            
            <div class="mb-4">
                <label class="block font-bold text-sm text-gray-700 mb-1.5 uppercase tracking-wide">Phân tích / Nhận xét của Giáo viên</label>
                <textarea class="input-nhanxet w-full min-h-[80px] px-4 py-2.5 bg-white/90 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-700 font-medium text-gray-800" placeholder="Giải thích chi tiết tại sao cách viết này chưa ổn và tác hại làm giảm sức thuyết phục ra sao..."></textarea>
            </div>
            
            <div class="mb-2">
                <label class="block font-bold text-sm text-gray-700 mb-1.5 uppercase tracking-wide">Câu văn gợi ý viết lại hoàn chỉnh</label>
                <input type="text" class="input-goiy w-full px-4 py-2.5 bg-white/90 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-green-700 font-medium text-gray-800" placeholder="Nhập phần văn bản mượt mà, trau chuốt sau khi đã sửa đổi">
            </div>
            
            <div class="flex justify-end mt-4">
                <button class="bg-red-100 hover:bg-red-200 text-red-600 text-xs font-bold px-4 py-2 rounded-lg transition-all" onclick="this.closest('.error-block').remove()">
                    🗑️ Xóa khối lỗi này
                </button>
            </div>
        `;
        errorContainer.appendChild(errorBlock);
    }

    // Tự động dựng sẵn 1 khối lỗi khi admin mở trang
    themLoiMoi();

    // 4. Hàm Lưu Nhận Xét - Tích hợp SweetAlert2 và hiệu ứng Toast chuyên nghiệp
    function guiNhanXet() {
        const danhGia = document.getElementById("danhGiaChung").value;
        const goiY = document.getElementById("goiYNangCap").value;

        const mangLoi = [];
        const cacKhoiLoi = document.querySelectorAll(".error-block");
        
        cacKhoiLoi.forEach(khoi => {
            const tieuDe = khoi.querySelector(".input-tieude").value;
            const doanGoc = khoi.querySelector(".input-doangoc").value;
            const nhanXet = khoi.querySelector(".input-nhanxet").value;
            const loiGoiY = khoi.querySelector(".input-goiy").value;

            if(tieuDe || doanGoc || nhanXet || loiGoiY) {
                mangLoi.push({
                    tieuDe: tieuDe || "Lỗi diễn đạt tổng hợp",
                    doanGoc: doanGoc || "...",
                    nhanXet: nhanXet || "Không có nhận xét chi tiết bổ sung.",
                    goiY: loiGoiY || "..."
                });
            }
        });

        // Đóng gói lưu vào LocalStorage
        localStorage.setItem("danhGiaChung", danhGia);
        localStorage.setItem("goiYNangCap", goiY);
        localStorage.setItem("danhSachLoiAdmin", JSON.stringify(mangLoi)); 
        localStorage.setItem("trangThaiChua", "hoanthanh");

        // Sử dụng SweetAlert2 hiển thị popup chuyên nghiệp
        Swal.fire({
            icon: 'success',
            title: 'Hoàn Thành Chữa Bài!',
            text: 'Dữ liệu nhận xét đã được lưu và gửi tới trang kết quả của học viên.',
            confirmButtonColor: '#166534',
            confirmButtonText: 'Xem trang Kết Quả',
            showClass: {
                popup: 'animate__animated animate__fadeInDown'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                // Điều hướng sang trang hiển thị kết quả (Sửa lại tên file khớp với cấu trúc của bạn)
                window.location.href = "ketqua.html";
            }
        });
    }

    // 5. Đăng xuất tài khoản quản trị
    function logout() {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("role");
        window.location.href = "taikhoan.html";
    }
</script>

</body>
</html>
