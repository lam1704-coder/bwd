<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
    body { background: #fff; padding: 50px; }
    .container { max-width: 1000px; margin: auto; }

    /* Cấu trúc chính */
    .main-wrapper { display: flex; align-items: flex-start; gap: 80px; }
    .left-col { flex: 1; }
    .right-col { flex: 1; }

    /* Phần văn bản bên trái */
    .title-left { color: #1e4530; font-size: 32px; font-weight: bold; margin-bottom: 20px; }
    .desc-left { color: #555; line-height: 1.6; margin-bottom: 30px; }
    .btn-viet-ngay { background: transparent; border: 2px solid #1e4530; color: #1e4530; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-bottom: 30px; }
    .item-list { border-top: 1px solid #ddd; padding-top: 15px; }
    .item { display: flex; justify-content: space-between; padding: 15px 0; color: #333; font-weight: 500; cursor: pointer; }

    /* Khung nhập liệu bên phải - Giống ảnh */
    .input-box { 
        background: #fff5f8; 
        padding: 25px; 
        border-radius: 20px; 
        border: 1px solid #ffd6e4;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    textarea { 
        width: 100%; height: 250px; border: none; background: transparent; 
        resize: none; outline: none; font-size: 16px; color: #555;
    }
    .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .plus-btn { color: #f48fb1; font-size: 24px; cursor: pointer; font-weight: bold; }
    .arrow-btn { color: #f48fb1; font-size: 24px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
    <div class="main-wrapper">
        <div class="left-col">
            <h1 class="title-left">Khởi nguồn cảm hứng thi ca</h1>
            <p class="desc-left">Thường Văn đồng hành cùng tâm hồn nghệ sĩ để giúp bạn mài giũa ngôn từ, trau chuốt ý thơ và kiến tạo những áng văn bất hủ chỉ trong khoảnh khắc.</p>
            <button class="btn-viet-ngay">Viết ngay</button>
            <div class="item-list">
                <div class="item">Nhận các gợi ý viết nâng cao <span>></span></div>
                <div class="item">Đảm bảo tính nguyên bản với tính năng AI <span>></span></div>
                <div class="item">Tạo nội dung hấp dẫn <span>></span></div>
            </div>
        </div>

        <div class="right-col">
            <div class="input-box">
                <textarea id="main-textarea" placeholder="Nhập văn bản"></textarea>
                <div class="controls">
                    <div class="plus-btn">+</div>
                    <div class="arrow-btn" onclick="kichHoatChuaBai()">➔</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function kichHoatChuaBai(){
        let text = document.getElementById("main-textarea").value;
        if(!text.trim()){ alert("Vui lòng nhập nội dung!"); return; }
        localStorage.setItem("baiChoChua", text);
        window.location.href = "cho.html";
    }
</script>

</body>
</html>
