<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kim Linh - Chữa bài văn</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#fcecf3;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

/* HEADER */

.main-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
}

.profile-group{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar-circle{
    width:55px;
    height:55px;
    border-radius:50%;
    overflow:hidden;
}

.avatar-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.logo-text{
    font-size:22px;
    font-weight:700;
}

.center-logo-wrapper img{
    width:130px;
}

.menu-btn{
    font-size:24px;
    cursor:pointer;
}

/* CONTENT */

.main-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:50px;
    margin-top:40px;
    flex-wrap:wrap;
}

/* ẢNH */

.left-image{
    flex:1;
    min-width:300px;
}

.left-image img{
    width:100%;
    border-radius:25px;
    display:block;
}

/* FORM */

.right-box{
    flex:1;
    min-width:350px;
}

.title{
    text-align:center;
    color:#1f3d28;
    margin-bottom:25px;
    font-size:35px;
}

.input-card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

textarea{
    width:100%;
    height:280px;
    border:1px solid #ffd7e6;
    border-radius:15px;
    padding:15px;
    resize:none;
    outline:none;
    font-size:16px;
}

.bottom-bar{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.plus-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#f7a9c4;
    color:white;
    cursor:pointer;
    font-size:20px;
}

.btn-gui-bai{
    border:none;
    background:#f48fb1;
    color:white;
    padding:12px 35px;
    border-radius:30px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.btn-gui-bai:hover{
    background:#ec6f9f;
}

@media(max-width:768px){

    .main-content{
        flex-direction:column;
    }

    .title{
        font-size:28px;
    }

}

</style>
</head>
<body>

<div class="container">

    <header class="main-header">

        <div class="profile-group">
            <div class="avatar-circle">
                <img src="images/tgia1.jpg" alt="">
            </div>
            <div class="logo-text">Kim Linh</div>
        </div>

        <a href="index.html" class="center-logo-wrapper">
            <img src="images/Logo_.png" alt="">
        </a>

        <div class="menu-btn">
            <i class="fas fa-ellipsis-h"></i>
        </div>

    </header>

    <div class="main-content">

       

        <div class="right-box">

            <h2 class="title">
                Gửi bài để Admin chữa
            </h2>

            <div class="input-card">

                <textarea
                    id="main-textarea"
                    placeholder="Nhập bài viết của bạn..."
                ></textarea>

                <div class="bottom-bar">

                    <button class="plus-btn">
                        <i class="fas fa-plus"></i>
                    </button>

                    <button
                        class="btn-gui-bai"
                        onclick="kichHoatChuaBai()">
                        Gửi bài
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function kichHoatChuaBai(){

    let text =
        document.getElementById("main-textarea").value;

    if(text.trim() === ""){
        alert("Vui lòng nhập nội dung!");
        return;
    }

    localStorage.setItem(
        "baiChoChua",
        text
    );

    localStorage.setItem(
        "trangThaiChua",
        "dangcho"
    );

    window.location.href = "cho.html";
}

</script>

</body>
</html>
