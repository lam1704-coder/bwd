<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Văn Học & Podcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#fdf2f4]">

<section class="w-full py-10 px-5 md:px-10 bg-[#fdf2f4]">
    <div class="max-w-[1400px] mx-auto">
        
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-4">
                <button class="bg-white p-3 rounded-full shadow-md hover:bg-gray-100 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="black" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <button class="bg-black text-white p-3 rounded-full shadow-md hover:scale-110 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
            <div class="flex flex-col gap-1.5 cursor-pointer group">
                <div class="w-10 h-1 bg-green-900 rounded-full group-hover:w-12 transition-all"></div>
                <div class="w-12 h-1 bg-green-900 rounded-full"></div>
                <div class="w-8 h-1 bg-green-900 rounded-full group-hover:w-12 transition-all"></div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            
            <div class="col-span-12 lg:col-span-9 relative rounded-[3rem] overflow-hidden shadow-2xl h-[520px] bg-white">
                <img src="main-bg.jpg" class="w-full h-full object-cover opacity-90">
                
                <div class="absolute inset-0 flex flex-col items-center justify-start pt-10">
                    <div class="bg-white/40 backdrop-blur-xl p-6 md:p-10 rounded-[3rem] border border-white/50 w-[90%] md:w-[85%] shadow-2xl">
                        <div class="flex flex-col md:flex-row items-center gap-8">
                            <div class="relative">
                                <img src="PODCAST 1.png" class="w-36 h-36 md:w-40 md:h-40 rounded-full border-[8px] border-white object-cover shadow-2xl animate-[spin_10s_linear_infinite]">
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="w-8 h-8 bg-white rounded-full border-4 border-gray-100"></div>
                                </div>
                            </div>

                            <div class="flex-1 text-center md:text-left">
    <p class="font-['Montserrat'] text-green-900 font-bold text-lg mb-1 opacity-80 uppercase tracking-wider">
        Tác phẩm
    </p>
    
    <h3 class="font-['Anton'] text-5xl md:text-7xl text-green-950 leading-tight tracking-normal uppercase">
        “VỢ CHỒNG <br> A PHỦ”
    </h3>
    
    <div class="mt-4">
        <div class="w-full bg-gray-200/50 h-2 rounded-full relative overflow-hidden">
            <div class="absolute bg-green-800 h-full w-[65%] rounded-full shadow-[0_0_10px_rgba(21,128,61,0.5)]"></div>
        </div>
        <div class="flex justify-between mt-2 text-green-900 font-bold text-xs font-['Montserrat']">
            <span>12:15</span>
            <span>25:30</span>
        </div>
    </div>
</div>
                        </div>
                    </div>

                    <div class="mt-8 flex items-center gap-10">
                        <button class="text-white hover:scale-125 transition-all drop-shadow-lg text-3xl">⏮</button>
                        <button class="bg-white text-green-900 w-20 h-20 rounded-full flex items-center justify-center text-3xl shadow-2xl hover:scale-110 active:scale-95 transition-all">
                            ▶
                        </button>
                        <button class="text-white hover:scale-125 transition-all drop-shadow-lg text-3xl">⏭</button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-3 flex flex-col gap-4 overflow-y-auto max-h-[520px] pr-2 scrollbar-hide">
                <div class="group cursor-pointer relative overflow-hidden rounded-[2rem] shadow-lg">
                    <img src="item1.jpg" class="w-full group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="group cursor-pointer relative overflow-hidden rounded-[2rem] shadow-lg">
                    <img src="item2.jpg" class="w-full group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="group cursor-pointer relative overflow-hidden rounded-[2rem] shadow-lg">
                    <img src="item3.jpg" class="w-full group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="group cursor-pointer relative overflow-hidden rounded-[2rem] shadow-lg">
                    <img src="item4.jpg" class="w-full group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="flex justify-center py-2">
                    <div class="w-10 h-10 bg-green-800 rounded-full flex items-center justify-center text-white shadow-lg animate-bounce cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"/></svg>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<style>
    /* Ẩn thanh cuộn nhưng vẫn có thể cuộn được */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
</style>

</body>
</html>
