    <div class="max-w-[1400px] mx-auto">
        
        <div class="flex justify-between items-center mb-6">

                <button class="bg-white p-3 rounded-full shadow-md hover:bg-gray-100 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="black" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <button class="bg-black text-white p-3 rounded-full shadow-md hover:scale-110 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
            <div class="flex flex-col gap-1.5 cursor-pointer group">
                <div class="w-10 h-1 bg-green-900 rounded-full group-hover:w-12 transition-all"></div>
                <div class="w-12 h-1 bg-green-900 rounded-full"></div>
                <div class="w-8 h-1 bg-green-900 rounded-full group-hover:w-12 transition-all"></div>

        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-9 relative rounded-[0.5rem] overflow-hidden shadow-2xl h-[520px] bg-white">
                <img src="images/ANH NEN PC.jpg" class="w-full h-full object-cover opacity-90">
                
                <div class="absolute inset-0 flex flex-col items-center justify-start pt-10">
                    <div class="bg-white/40 backdrop-blur-xl p-6 md:p-10 rounded-[1rem] border border-white/50 w-[90%] md:w-[85%] shadow-2xl">
                        <div class="flex flex-col md:flex-row items-center gap-8">
                            <div class="relative">
                                <img id="mainImage" src="images/nền khung tròn.jpg" class="w-36 h-36 md:w-40 md:h-40 rounded-full border-[8px] border-white object-cover shadow-2xl animate-[spin_10s_linear_infinite]">
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="w-8 h-8 bg-white rounded-full border-4 border-gray-100"></div>
                                </div>
                            </div>

                            <div class="flex-1 text-center md:text-left">
                                <p class="font-['Montserrat'] text-green-900 font-bold text-lg mb-1 opacity-80 uppercase tracking-wider">
                                    Tác phẩm
                                </p>
                                
                                <h3 id="mainTitle" class="font-['Anton'] text-4xl md:text-6xl text-green-700 leading-tight tracking-normal uppercase font-bold">
                                    “VỢ CHỒNG <br> A PHỦ”
                                </h3>
                                
                                <div class="mt-4">
                                    <div id="progressContainer" class="w-full bg-gray-200/50 h-2 rounded-full relative overflow-hidden cursor-pointer">
                                        <div id="progressBar" class="absolute bg-green-800 h-full w-[0%] rounded-full shadow-[0_0_10px_rgba(21,128,61,0.5)] transition-all duration-100 ease-linear"></div>
                                    </div>
                                    <div class="flex justify-between mt-2 text-green-900 font-bold text-xs font-['Montserrat']">
                                        <span id="currentTime">00:00</span>
                                        <span id="durationTime">00:00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex items-center gap-10">
                        <button id="skipBackBtn" class="text-white hover:scale-125 transition-all drop-shadow-lg text-5xl">⏮</button>
                        <button id="playPauseBtn" class="bg-white text-green-800 w-20 h-20 rounded-full flex items-center justify-center text-5xl shadow-2xl hover:scale-110 active:scale-95 transition-all">
                            ▶
                        </button>
                        <button id="skipForwardBtn" class="text-white hover:scale-125 transition-all drop-shadow-lg text-5xl">⏭</button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-3 flex flex-col gap-6 overflow-y-auto max-h-[720px] pr-4 scrollbar-hide">
                
                <div class="w-full playlist-item" data-src="audio/vo-chong-a-phu.mp3" data-title="“VỢ CHỒNG <br> A PHỦ”" data-img="images/nền khung tròn.jpg">
                    <div class="aspect-square w-full relative overflow-hidden rounded-[1rem] shadow-xl border-4 border-transparent hover:border-green-800 transition-all duration-500 cursor-pointer group">

                <div class="w-full playlist-item" data-src="audio/tac-pham-2.mp3" data-title="“TÁC PHẨM <br> SỐ HAI”" data-img="images/anh5.jpg">
                    <div class="aspect-square w-full relative overflow-hidden rounded-[1rem] shadow-xl border-4 border-transparent hover:border-green-800 transition-all duration-500 cursor-pointer group">
                        <img src="images/anh5.jpg" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                </div>

                <div class="w-full playlist-item" data-src="audio/tac-pham-3.mp3" data-title="“TÁC PHẨM <br> SỐ BA”" data-img="images/anh6.jpg">
                    <div class="aspect-square w-full relative overflow-hidden rounded-[1rem] shadow-xl border-4 border-transparent hover:border-green-800 transition-all duration-500 cursor-pointer group">
                        <img src="images/anh6.jpg" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                </div>

                <div class="w-full playlist-item" data-src="audio/tac-pham-4.mp3" data-title="“TÁC PHẨM <br> SỐ BỐN”" data-img="images/anh7.jpg">
                    <div class="aspect-square w-full relative overflow-hidden rounded-[1rem] shadow-xl border-4 border-transparent hover:border-green-800 transition-all duration-500 cursor-pointer group">
                        <img src="images/anh7.jpg" class="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                </div>

                <div class="flex justify-center py-4">
                    <div class="w-14 h-14 bg-[#14532d] rounded-full flex items-center justify-center text-white shadow-2xl animate-bounce cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"/></svg>
                    </div>

        <div class="relative -mt-20 w-full px-6 md:px-12 pb-10 z-20">

                    <span class="font-bold text-green-800">Vợ chồng A Phủ</span> là truyện ngắn đặc sắc của nhà văn Tô Hoài...
                </p>
                <div class="mt-2 flex items-center gap-4">
                    <div class="h-[1px] w-12 bg-green-900/20"></div>
                    <span class="font-['Montserrat'] text-green-900/50 text-sm italic">Truyện Tây Bắc (1952)</span>
                </div>
            </div>
        </div>
    </div>
</section>

<audio id="podcastAudio" src="test.mp3" preload="metadata"></audio>

<script>
    const audio = document.getElementById('podcastAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');
    const skipBackBtn = document.getElementById('skipBackBtn');
    const skipForwardBtn = document.getElementById('skipForwardBtn');
    
    // Khai báo thêm các phần tử cần đổi thông tin
    const mainTitle = document.getElementById('mainTitle');
    const mainImage = document.getElementById('mainImage');
    const playlistItems = document.querySelectorAll('.playlist-item');

    function formatTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min < 10 ? '0' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    audio.addEventListener('loadedmetadata', () => {
        durationTimeEl.innerText = formatTime(audio.duration);
    });

    playPauseBtn.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.innerText = '⏸';
        } else {
            audio.pause();
            playPauseBtn.innerText = '▶';
        }
    });

    audio.addEventListener('timeupdate', () => {
        currentTimeEl.innerText = formatTime(audio.currentTime);
        const progressPercent = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = `${progressPercent}%`;
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });

    skipBackBtn.addEventListener('click', () => { audio.currentTime -= 15; });
    skipForwardBtn.addEventListener('click', () => { audio.currentTime += 15; });

    audio.addEventListener('ended', () => {
        playPauseBtn.innerText = '▶';
        progressBar.style.width = '0%';
        audio.currentTime = 0;
    });

    // TÍNH NĂNG CHỌN BÀI TỪ DANH SÁCH BÊN PHẢI
    playlistItems.forEach(item => {
        item.addEventListener('click', () => {
            // 1. Lấy thông tin từ data-* attributes
            const newSrc = item.getAttribute('data-src');
            const newTitle = item.getAttribute('data-title');
            const newImg = item.getAttribute('data-img');

            // 2. Cập nhật giao diện
            mainTitle.innerHTML = newTitle;
            mainImage.src = newImg;
            progressBar.style.width = '0%';

            // 3. Đổi file âm thanh và tự động phát
            audio.src = newSrc;
            audio.play();
            playPauseBtn.innerText = '⏸';
        });
    });
</script>

</body>
</html>
