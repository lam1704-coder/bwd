   <audio id="bg-music" loop src="audio/nhac-nen.mp3" preload="auto"></audio>

<button id="music-toggle-btn" onclick="toggleMusic()" 
        style="position: fixed; bottom: 130px; right: 30px; z-index: 9999; 
               background-color: #ffcce0; color: #d81b60; border: 2px solid #fff; 
               border-radius: 50%; width: 45px; height: 45px;

</button>

<script>
    const audio = document.getElementById('bg-music');
    const toggleBtn = document.getElementById('music-toggle-btn');
    
    // Lấy thời gian nhạc đang nghe dở (nếu có)
    const savedTime = localStorage.getItem('musicTime') || 0;
    audio.currentTime = parseFloat(savedTime);

    // HÀM CỐ GẮNG TỰ ĐỘNG PHÁT NHẠC
    function attemptAutoplay() {
        audio.play().then(() => {
            // Trình duyệt cho phép phát (Thường là khi chuyển trang)
            localStorage.setItem('musicPlaying', 'true');
            updateUI(true);
        }).catch((error) => {
            // Trình duyệt chặn (Lần đầu vào web). Đợi người dùng click bất kỳ đâu
            updateUI(false);
            document.body.addEventListener('click', function startOnFirstInteraction() {
                audio.play();
                localStorage.setItem('musicPlaying', 'true');
                updateUI(true);
                document.body.removeEventListener('click', startOnFirstInteraction);
            }, { once: true });
        });
    }

    // Chạy thử tự động phát ngay khi trang vừa tải xong
    attemptAutoplay();

    // Liên tục lưu lại thời gian bài hát mỗi giây
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicTime', audio.currentTime);
        }
    }, 1000);

    // Hàm Bật/Tắt nhạc chủ động khi người dùng bấm vào nút
    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            localStorage.setItem('musicPlaying', 'true');
            updateUI(true);
        } else {
            audio.pause();
            localStorage.setItem('musicPlaying', 'false');
            updateUI(false);
        }
    }

    // Hàm cập nhật giao diện nút (khi tắt nhạc, nút sẽ mờ đi một chút để báo hiệu)
    function updateUI(playing) {
        if (playing) {
            toggleBtn.style.opacity = '1';
        } else {
            toggleBtn.style.opacity = '0.5';
        }
    }
</script>

        let currentTab = "Mở/Kết bài"; 
        let currentPage = 0;

        // --- HÀM RENDER NỘI DUNG CHÍNH ---
        function renderContent() {
            const titleElement = document.getElementById('contentTitle');
            const bodyElement = document.getElementById('contentBody');
            const paginationCtrl = document.getElementById('paginationCtrl');
            const displayArea = document.getElementById('displayArea');
            
            const currentData = articlesData[currentTab];
            if (!currentData) return;

            titleElement.innerText = currentTab === "Dẫn chứng" ? "Dẫn chứng & cách dùng" : currentTab;
            displayArea.style.opacity = 0.4;

            setTimeout(() => {
                if (currentData.type === "text") {
                    paginationCtrl.classList.remove('hidden');
                    
                    const totalPages = currentData.pages.length;
                    const pageParagraphs = currentData.pages[currentPage];
                    
                    document.getElementById('pageNumber').innerText = `Trang ${currentPage + 1} / ${totalPages}`;
                    
                    // Chuẩn hóa việc render: Chấp nhận cả chuỗi HTML và mảng chuỗi văn bản
                    if (Array.isArray(pageParagraphs)) {
                        bodyElement.innerHTML = pageParagraphs.map(para => {
                            const cleaned = para.trim();
                            if (cleaned.startsWith("<")) {
                                return cleaned;
                            }
                            return `<p class='mb-4'>${cleaned}</p>`;
                        }).join("");
                    } else {
                        bodyElement.innerHTML = pageParagraphs;
                    }
                    
                    document.getElementById('btnPrev').disabled = (currentPage === 0);
                    document.getElementById('btnNext').disabled = (currentPage === totalPages - 1);
                    
                } else if (currentData.type === "grid") {
                    paginationCtrl.classList.add('hidden');
                    
                    let gridHtml = `<div class='grid grid-cols-1 md:grid-cols-2 gap-6 mt-4'>`;
                    currentData.items.forEach((item, index) => {
                        gridHtml += `
                            <div onclick="openModal('${item.title}', ${index})" class="bg-[#14532d] hover:bg-[#1f663b] text-white p-8 rounded-2xl shadow-md transition-all duration-300 transform hover:-translate-y-1 cursor-pointer flex flex-col justify-center items-center text-center min-h-[140px]">
                                <h4 class="text-xl font-bold tracking-wide">${item.title}</h4>
                                <p class="text-xs text-green-200/80 mt-2 font-light line-clamp-2">${item.preview}</p>
                            </div>
                        `;
                    });
                    gridHtml += `</div>`;
                    bodyElement.innerHTML = gridHtml;
                }
                displayArea.style.opacity = 1;
            }, 100);
        }

        // --- HÀM XỬ LÝ POPUP MODAL ---
        function openModal(title, index) {
            const modal = document.getElementById('infoModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            
            const itemDetails = articlesData[currentTab].items[index].details;
            
            modalTitle.innerText = title;
            modalContent.innerHTML = itemDetails;
            
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        // --- ĐIỀU HƯỚNG TABS SIDEBAR ---
        function changeTab(tabName) {
            currentTab = tabName;
            currentPage = 0;
            const buttons = document.querySelectorAll('.sidebar-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const targetTab = document.getElementById(`tab-${tabName}`);
            if (targetTab) {
                targetTab.classList.add('active');
            }
            renderContent();
        }

        function nextPage() {
            if (currentPage < articlesData[currentTab].pages.length - 1) {
                currentPage++;
                renderContent();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderContent();
            }
        }

        // Khởi động giao diện mượt mà khi load trang hoàn tất
        document.addEventListener("DOMContentLoaded", () => {
            changeTab('Mở/Kết bài');
        });
    </script>
