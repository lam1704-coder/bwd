<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết đạt giải nhất HSGQG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Anton&display=swap" rel="stylesheet">
    <style>
        /* Chèn ảnh nền phía sau toàn bộ trang */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fdf2f4;
            background-image: url('https://img.freepik.com/free-vector/abstract-watercolor-background_23-2149021020.jpg');
            background-size: cover;
            background-attachment: fixed;
        }
        .sidebar-item { padding: 1.2rem; border-radius: 1rem; transition: all 0.3s; text-align: center; color: #14532d; font-weight: 600; cursor: pointer; display: block; width: 100%; border: 1px solid transparent; margin-bottom: 8px;}
        .sidebar-item:hover, .sidebar-item.active { background-color: white; border: 1px solid #d1d5db; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="w-full relative h-[400px] overflow-hidden">
        <img src="https://img.freepik.com/free-vector/hand-painted-watercolor-nature-background_23-2148941599.jpg" class="w-full h-full object-cover">
        <div class="absolute inset-0 flex items-center justify-center">
            <h1 class="font-['Anton'] text-4xl md:text-6xl text-green-900 uppercase tracking-tighter bg-white/30 backdrop-blur-sm p-8 rounded-3xl">Bài viết đạt giải nhất HSGQG</h1>
        </div>
    </div>

    <main class="max-w-[1200px] mx-auto px-6 pb-20 -mt-20 relative z-10">
        <div class="flex flex-col lg:flex-row gap-10">
            
            <aside class="w-full lg:w-1/3 flex flex-col items-center">
                <div class="w-32 h-32 rounded-full bg-white flex items-center justify-center border-4 border-green-800 shadow-xl z-20 mb-[-60px]">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png" alt="Logo" class="w-20 h-20">
                </div>
                
                <div class="bg-[#fce7f3]/80 backdrop-blur-md rounded-[2rem] p-6 pt-20 shadow-sm border border-white/50 w-full">
                    <button onclick="showContent('Tổng quan', 'Nội dung chi tiết về tác giả và giá trị bài viết...', this)" class="sidebar-item active">Tổng quan bài viết</button>
                    <button onclick="showContent('Ngôn từ & hình ảnh', 'Phân tích các biện pháp nghệ thuật trong bài...', this)" class="sidebar-item">Ngôn từ & hình ảnh</button>
                    <button onclick="showContent('Mở/Kết bài', 'Công thức viết mở bài gây ấn tượng...', this)" class="sidebar-item">Cách viết mở/kết bài</button>
                    <button onclick="showContent('Cách lập luận', 'Xây dựng cấu trúc lập luận chặt chẽ...', this)" class="sidebar-item">Cách lập luận</button>
                    <button onclick="showContent('Dẫn chứng', 'Cách chọn lọc dẫn chứng đắt giá...', this)" class="sidebar-item">Dẫn chứng & cách dùng</button>
                    <button onclick="showContent('Lật ngược vấn đề', 'Tư duy phản biện là chìa khóa...', this)" class="sidebar-item">Lật ngược vấn đề</button>
                </div>
            </aside>

            <article class="w-full lg:w-2/3">
                <div id="displayArea" class="bg-white/90 backdrop-blur-sm rounded-[2rem] p-10 shadow-2xl min-h-[400px] border border-white transition-all duration-500">
                    <h2 id="contentTitle" class="text-3xl font-bold text-green-900 mb-6 border-b pb-4">Tổng quan bài viết</h2>
                    <p id="contentBody" class="text-gray-700 leading-relaxed text-lg">Chào bạn, hãy chọn một mục ở cột bên trái để hiển thị nội dung phân tích chi tiết tại đây nhé!</p>
                </div>
            </article>
        </div>
    </main>

    <script>
        function showContent(title, content, element) {
            document.getElementById('contentTitle').innerText = title;
            document.getElementById('contentBody').innerText = content;

            const buttons = document.querySelectorAll('.sidebar-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            const area = document.getElementById('displayArea');
            area.style.opacity = 0;
            setTimeout(() => { area.style.opacity = 1; }, 100);
        }
    </script>
</body>
</html>
