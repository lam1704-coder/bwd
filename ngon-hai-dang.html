<!DOCTYPE html>
<html lang="vi">
    <script>
    // Kiểm tra trạng thái: Nếu chưa đăng nhập thì lập tức chuyển hướng về trang tài khoản
    if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "taikhoan.html"; 
    }
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Người Truyền Cảm Hứng - Slider</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Thiết lập cơ bản cho toàn bộ trang web */
        body {
            margin: 0;
            padding: 0;
            background-color: #fcf6f7; /* Nền hồng cam cực nhạt giúp làm nổi bật slider */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Căn giữa màn hình theo chiều dọc */
        }

        /* Khóa cố định thuộc tính lướt ảnh để không bị lỗi giao diện */
        .slide-item {
            min-width: 100% !important;
            max-width: 100% !important;
            height: 100%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
   <audio id="bg-music" loop src="audio/nhacnen.mp3" preload="auto"></audio>

<button id="music-toggle-btn" onclick="toggleMusic()" 
        style="position: fixed; bottom: 130px; right: 30px; z-index: 9999; 
               background-color: #ffcce0; color: #d81b60; border: 2px solid #fff; 
               border-radius: 50%; width: 45px; height: 45px; 
               display: flex; justify-content: center; align-items: center; 
               cursor: pointer; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.2); 
               transition: all 0.3s ease;"
        onmouseover="this.style.transform='scale(1.1)'; this.style.boxShadow='0 6px 20px rgba(216, 27, 96, 0.4)';"
        onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 15px rgba(216, 27, 96, 0.2)';">
    <svg id="music-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
        <path d="M9 13c0 1.105-1.12 2-2.5 2S4 14.105 4 13s1.12-2 2.5-2 2.5.895 2.5 2z"/>
        <path fill-rule="evenodd" d="M9 3v10H8V3h1z"/>
        <path d="M8 2.82a1 1 0 0 1 .804-.98l3-.6A1 1 0 0 1 13 2.22V4L8 5V2.82z"/>
    </svg>
</button>

<script>
    const audio = document.getElementById('bg-music');
    const toggleBtn = document.getElementById('music-toggle-btn');
    
    // Lấy thời gian nhạc đang nghe dở (nếu có)
    const savedTime = localStorage.getItem('musicTime') || 0;
    audio.currentTime = parseFloat(savedTime);

    // HÀM CỐ GẮNG TỰ ĐỘNG PHÁT NHẠC
    function attemptAutoplay() {
        audio.play().then(() => {
            // Trình duyệt cho phép phát (Thường là khi chuyển trang)
            localStorage.setItem('musicPlaying', 'true');
            updateUI(true);
        }).catch((error) => {
            // Trình duyệt chặn (Lần đầu vào web). Đợi người dùng click bất kỳ đâu
            updateUI(false);
            document.body.addEventListener('click', function startOnFirstInteraction() {
                audio.play();
                localStorage.setItem('musicPlaying', 'true');
                updateUI(true);
                document.body.removeEventListener('click', startOnFirstInteraction);
            }, { once: true });
        });
    }

    // Chạy thử tự động phát ngay khi trang vừa tải xong
    attemptAutoplay();

    // Liên tục lưu lại thời gian bài hát mỗi giây
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('musicTime', audio.currentTime);
        }
    }, 1000);

    // Hàm Bật/Tắt nhạc chủ động khi người dùng bấm vào nút
    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            localStorage.setItem('musicPlaying', 'true');
            updateUI(true);
        } else {
            audio.pause();
            localStorage.setItem('musicPlaying', 'false');
            updateUI(false);
        }
    }

    // Hàm cập nhật giao diện nút (khi tắt nhạc, nút sẽ mờ đi một chút để báo hiệu)
    function updateUI(playing) {
        if (playing) {
            toggleBtn.style.opacity = '1';
        } else {
            toggleBtn.style.opacity = '0.5';
        }
    }
</script>

    <div class="custom-slider-container" style="
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
        padding: 40px;
        font-family: 'Montserrat', sans-serif;
        width: 100%;
        max-width: 800px; /* Giới hạn độ rộng tối đa của cụm slider */
        box-sizing: border-box;
    ">
        
        <div class="slide-arrow" onclick="prevSlide()" style="
            width: 0; 
            height: 0; 
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 18px solid #739d6f;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        " onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>

        <div class="slider-window" style="
            width: 500px; 
            height: 500px;
            position: relative;
            overflow: hidden; /* Cắt ảnh thừa lấn ra ngoài để tạo hiệu ứng lướt ẩn hiện */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
            background-color: #fff;
        ">
            
            <div class="slides-wrapper" id="slidesWrapper" style="
                display: flex;
                width: 100%;
                height: 100%;
                transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            ">
                
                <div class="slide-item">
                    <img src="images/Ngọn hải đăng.png" alt="Mùa xuân" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="slide-item">
                    <img src="images/ngọn hải đăng 1.png" alt="Slide 2" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="slide-item">
                    <img src="images/ngọn hải đăng 2.png" alt="Slide 3" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                 <div class="slide-item">
                    <img src="images/ngọn hải đăng 3.png" alt="Slide 3" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

            </div>
        </div>

        <div class="slide-arrow" onclick="nextSlide()" style="
            width: 0; 
            height: 0; 
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 18px solid #739d6f;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        " onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>

    </div>

    <script>
        let currentSlideIndex = 0;
        const totalSlides = 4; // Tổng số ô vuông ảnh bạn đang có

        function updateSliderPosition() {
            const wrapper = document.getElementById('slidesWrapper');
            // Dịch chuyển khối wrapper theo chiều ngang dựa vào slide hiện tại
            wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) {
                currentSlideIndex++;
            } else {
                currentSlideIndex = 0; // Nếu hết ảnh thì quay lại ô vuông đầu tiên
            }
            updateSliderPosition();
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
            } else {
                currentSlideIndex = totalSlides - 1; // Nếu lùi quá đầu thì nhảy đến ô vuông cuối cùng
            }
            updateSliderPosition();
        }
    </script>
</body>
</html>
